<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Shorts 嵌入範例</title>
    <style>
      .player {
        width: 100%;
        max-width: 360px;
        aspect-ratio: 9 / 16;
      }
      .player iframe {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <!-- video not ok -->
    <div class="vid-yt-mini-box">
      <div class="vid-yt-frame-wrap">
        <iframe
          id="vid-player-target"
          frameborder="0"
          allowfullscreen=""
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          title="YouTube video player"
          width="100%"
          height="100%"
          src="https://www.youtube.com/embed/?listType=playlist&amp;list=PLeJefHYPujM9rXj2c294gi6S5sHmiH-UG&amp;autoplay=1&amp;mute=1&amp;rel=0&amp;loop=1&amp;playlist=PLeJefHYPujM9rXj2c294gi6S5sHmiH-UG&amp;origin=https%3A%2F%2Fwww.jitabet.cloud&amp;enablejsapi=1&amp;widgetid=2&amp;forigin=https%3A%2F%2Fwww.jitabet.cloud%2F&amp;aoriginsup=1&amp;vf=6"
          data-gtm-yt-inspected-21="true"
        ></iframe>
      </div>
      <div class="vid-yt-btn-wrap">
        <button class="vid-yt-popup-btn">প্লেলিস্ট দেখুন</button>
      </div>
    </div>
    <!-- video ok -->
    <div class="vid-yt-mini-box">
      <div class="vid-yt-frame-wrap">
        <iframe
          id="vid-player-target"
          frameborder="0"
          allowfullscreen=""
          allow="
            accelerometer;
            autoplay;
            clipboard-write;
            encrypted-media;
            gyroscope;
            picture-in-picture;
            web-share;
          "
          referrerpolicy="strict-origin-when-cross-origin"
          title="FIFA 2026 Daily Scratch প্রতিদিন স্ক্র্যাচ করুন, বড় পুরস্কার জিতুন #FIFA #Football #CR7 #ronaldo"
          width="100%"
          height="100%"
          src="https://www.youtube.com/embed/?listType=playlist&amp;list=PLtVVVPPuXsw7ClE3nPTzeY4khsPCoGjXr&amp;autoplay=1&amp;mute=1&amp;rel=0&amp;loop=1&amp;playlist=PLtVVVPPuXsw7ClE3nPTzeY4khsPCoGjXr&amp;origin=https%3A%2F%2Fwww.jitabet.cloud&amp;enablejsapi=1&amp;widgetid=2&amp;forigin=https%3A%2F%2Fwww.jitabet.cloud%2F&amp;aoriginsup=1&amp;vf=4"
          data-gtm-yt-inspected-21="true"
        ></iframe>
      </div>

      <div class="vid-yt-btn-wrap">
        <button class="vid-yt-popup-btn">প্লেলিস্ট দেখুন</button>
      </div>
    </div>
  </body>
</html>
