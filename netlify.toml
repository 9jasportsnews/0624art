[build]
  # Netlify 無法使用 --with-deps（需 root）。僅安裝 Chromium；檢測失敗仍會部署。
  command = "npm ci && npx playwright install chromium && npm run build:netlify"
  publish = "dashboard/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # 建置時預設跑 recorded；可在 Netlify 環境變數改為 all
  NETLIFY_TEST_SUITE = "all"

[[redirects]]
  from = "/api/trigger-check"
  to = "/.netlify/functions/trigger-check"
  status = 200

[[redirects]]
  from = "/api/status"
  to = "/.netlify/functions/status"
  status = 200
