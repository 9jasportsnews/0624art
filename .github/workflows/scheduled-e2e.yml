 定時 E2E：一次跑完 tests/recorded，TG 通知 + 報告 artifact 留存

 Secrets（擇一即可）：
   A. 單一 Secret「ENV_1」或「ENV」或「E2E_ENV」或「JITABET」：整份 .env 貼上
   B. 分開：HOME_URL、TEST_USERNAME、TEST_PASSWORD、TELEGRAM_BOT_TOKEN、TELEGRAM_CHAT_ID

 台灣 09:45 = UTC 01:45（整份 workflow 已停用）
 ===== 以下 GitHub Actions 已註解，不會觸發 =====
 name: 定時全項檢測

 on:
   schedule:
     - cron: '45 1 * * *'
   workflow_dispatch:
     inputs:
       smoke_only:
         description: '只跑 1 項快速測試（驗證 TG，約 1 分鐘）'
         type: boolean
         default: false

 concurrency:
   group: scheduled-e2e
   cancel-in-progress: false

 jobs:
   e2e:
     runs-on: ubuntu-latest
     timeout-minutes: 120

     steps:
       - uses: actions/checkout@v4

       - name: 載入環境變數（ENV_1 / ENV / E2E_ENV 整份貼上 或 個別 Secrets）
         env:
           E2E_ENV: ${{ secrets.E2E_ENV }}
           SECRET_ENV_1_BUNDLE: ${{ secrets.ENV_1 }}
           SECRET_ENV_BUNDLE: ${{ secrets.ENV }}
           JITABET: ${{ secrets.JITABET }}
           SECRET_HOME_URL: ${{ secrets.HOME_URL }}
           SECRET_TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
           SECRET_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
           SECRET_TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
           SECRET_TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
         run: |
           : > .env
           append_github_env() {
             local key="$1"
             local val="$2"
             if [[ "$val" == *$'\n'* || "$val" == *':'* || "$val" == *'%'* ]]; then
               {
                 echo "${key}<<GITHUB_ENV_EOF"
                 printf '%s\n' "$val"
                 echo "GITHUB_ENV_EOF"
               } >> "$GITHUB_ENV"
             else
               echo "${key}=${val}" >> "$GITHUB_ENV"
             fi
             printf '%s=%s\n' "$key" "$val" >> .env
           }
           load_env_block() {
             while IFS= read -r line || [ -n "$line" ]; do
               line="${line//$'\r'/}"
               line="$(printf '%s' "$line" | sed $'s/^\xef\xbb\xbf//')"
               [[ -z "${line// }" ]] && continue
               [[ "$line" =~ ^[[:space:]]* ]] && continue
               [[ "$line" != *"="* ]] && continue
               key="${line%%=*}"
               val="${line*=}"
               key="$(printf '%s' "$key" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
               val="$(printf '%s' "$val" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
               append_github_env "$key" "$val"
             done
           }
           pick_env_block() {
             if [ -n "$E2E_ENV" ]; then echo "$E2E_ENV"; return; fi
             if [ -n "$SECRET_ENV_1_BUNDLE" ]; then echo "$SECRET_ENV_1_BUNDLE"; return; fi
             if [ -n "$SECRET_ENV_BUNDLE" ]; then echo "$SECRET_ENV_BUNDLE"; return; fi
             if [ -n "$JITABET" ]; then echo "$JITABET"; return; fi
             echo ""
           }
           block="$(pick_env_block)"
           if [ -n "$block" ]; then
             if [ -n "$E2E_ENV" ]; then
               echo "已讀取 Secret：E2E_ENV（${block} 字元）"
             elif [ -n "$SECRET_ENV_1_BUNDLE" ]; then
               echo "已讀取 Secret：ENV_1（${block} 字元）"
             elif [ -n "$SECRET_ENV_BUNDLE" ]; then
               echo "已讀取 Secret：ENV（${block} 字元）"
             else
               echo "已讀取 Secret：JITABET（${block} 字元）"
             fi
             load_env_block <<< "$block"
           else
             echo "未設定 ENV_1 / ENV / E2E_ENV / JITABET，改讀個別 Secrets"
             echo "::warning::Secret「ENV_1」為空。請 Settings → Secrets → ENV_1 → Update 貼上整份 .env"
           fi
           for pair in \
             "HOME_URL=$SECRET_HOME_URL" \
             "TEST_USERNAME=$SECRET_TEST_USERNAME" \
             "TEST_PASSWORD=$SECRET_TEST_PASSWORD" \
             "TELEGRAM_BOT_TOKEN=$SECRET_TELEGRAM_BOT_TOKEN" \
             "TELEGRAM_CHAT_ID=$SECRET_TELEGRAM_CHAT_ID"; do
             key="${pair%%=*}"
             val="${pair*=}"
             if [ -n "$val" ]; then
               if ! grep -q "^${key}=" .env 2>/dev/null; then
                 append_github_env "$key" "$val"
               fi
             fi
           done
           echo "SITE_ID=${SITE_ID:-jitabet}" >> "$GITHUB_ENV"
           echo "SITE_LOCALE=${SITE_LOCALE:-en}" >> "$GITHUB_ENV"
           echo "TELEGRAM_NOTIFY_ON=${TELEGRAM_NOTIFY_ON:-always}" >> "$GITHUB_ENV"
           echo "TELEGRAM_AUTO_NOTIFY=${TELEGRAM_AUTO_NOTIFY:-1}" >> "$GITHUB_ENV"
           echo "CI=true" >> "$GITHUB_ENV"
           echo "GITHUB_ACTIONS=true" >> "$GITHUB_ENV"
           echo "SITE_ID=jitabet" >> .env
           echo "SITE_LOCALE=en" >> .env
           echo "TELEGRAM_NOTIFY_ON=always" >> .env
           echo "--- .env 診斷 ---"
           echo "行數: $(wc -l < .env | tr -d ' ')"
           echo "keys: $(grep -v '^' .env | grep '=' | cut -d= -f1 | tr '\n' ', ')"
           if ! grep -q '^TELEGRAM_BOT_TOKEN=.' .env 2>/dev/null; then
             echo "::error::.env 缺少 TELEGRAM_BOT_TOKEN"
             echo "→ 請到 Settings → Secrets → ENV_1（或 ENV）→ Update，貼上整份 .env"
             echo "→ TELEGRAM_BOT_TOKEN= 與 TELEGRAM_CHAT_ID= 前面不能有 "
             exit 1
           fi
           if ! grep -q '^TELEGRAM_CHAT_ID=.' .env 2>/dev/null; then
             echo "::error::.env 缺少 TELEGRAM_CHAT_ID"
             exit 1
           fi
           echo "✓ .env 已含 TELEGRAM_BOT_TOKEN 與 TELEGRAM_CHAT_ID"

       - name: 環境變數摘要（不顯示密碼）
         run: |
           for key in HOME_URL TEST_USERNAME TEST_PASSWORD TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID; do
             if [ -n "${!key}" ]; then
               if [ "$key" = "TEST_PASSWORD" ] || [ "$key" = "TELEGRAM_BOT_TOKEN" ]; then
                 val="${!key}"
                 echo "✓ ${key} 已設定（長度 ${val}）"
               else
                 echo "✓ ${key}=${!key}"
               fi
             else
               echo "⚠ ${key} 未設定（將使用程式內建預設值或略過 TG）"
             fi
           done
           if [ -f .env ]; then
             echo "✓ .env 已產生（$(wc -l < .env | tr -d ' ') 行）"
           fi

       - uses: actions/setup-node@v4
         with:
           node-version: '22'
           cache: npm

       - name: 安裝依賴
         run: npm ci

       - name: 驗證 Telegram 憑證（讀 .env）
         continue-on-error: true
         run: |
           node scripts/verify-telegram-env.mjs
           if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
             node scripts/verify-telegram-env.mjs --send || echo "::warning::TG ping 未成功，測試仍會繼續"
           fi

       - name: 安裝 Playwright Chromium
         run: npx playwright install chromium --with-deps

       - name: 執行 tests/recorded
         run: |
           if [ "${{ inputs.smoke_only }}" = "true" ]; then
             echo "煙霧測試：只跑 1 項（電腦版 Download）"
             npx playwright test tests/recorded/desktop-download.spec.ts -g "電腦版-進入首頁" --project=desktop-chrome
           else
             npx playwright test tests/recorded
           fi

       - name: Telegram 通知（保底，reporter 未送達時補送）
         if: always()
         run: |
           node scripts/verify-telegram-env.mjs || { echo "⚠ 略過 TG：憑證無效"; exit 0; }
           if [ ! -f reports/last-run.json ]; then
             echo "⚠ 無 reports/last-run.json，無法補送 TG"
             exit 0
           fi
           STATUS=$(node -p "require('./reports/last-run.json').notifyStatus || ''")
           if [ "$STATUS" = "sent" ]; then
             echo "✓ Playwright reporter 已推送 TG（notifyStatus=sent）"
             exit 0
           fi
           echo "補送 TG（先前狀態: ${STATUS:-未知}）"
           npm run notify:telegram -- reports/last-run.json

       - name: 失敗摘要（寫入 job log）
         if: always()
         run: |
           if [ -f reports/last-run.json ]; then
             node -e "
               const r = require('./reports/last-run.json');
               const failed = (r.tests || []).filter(t => t.status === 'failed' || t.status === 'timedOut');
               console.log('--- Playwright 失敗摘要 ---');
               console.log('TG 狀態:', r.notifyStatus || '(未知)');
               if (r.notifyError) console.log('TG 錯誤:', r.notifyError);
               console.log('執行環境:', r.runEnvironment || '(未知)');
               console.log('通過:', (r.tests || []).filter(t => t.status === 'passed').length, '/ 失敗:', failed.length);
               for (const t of failed.slice(0, 15)) {
                 console.log('✗', t.title);
                 if (t.error) console.log(' ', String(t.error).split('\n')[0].slice(0, 200));
               }
               if (failed.length > 15) console.log('…另有', failed.length - 15, '項');
             "
           else
             echo "無 reports/last-run.json（TG reporter 可能未執行或缺少 TELEGRAM 設定）"
           fi

       - name: 打包留存報告
         if: always()
         run: |
           STAMP=$(TZ=Asia/Taipei date '+%Y-%m-%d_%H-%M-%S')
           mkdir -p "reports/runs/${STAMP}"
           [ -d playwright-report ] && cp -R playwright-report "reports/runs/${STAMP}/"
           [ -d test-results ] && cp -R test-results "reports/runs/${STAMP}/"
           [ -f reports/last-run.json ] && cp reports/last-run.json "reports/runs/${STAMP}/"
           echo "ARCHIVE_STAMP=${STAMP}" >> "$GITHUB_ENV"

       - name: 上傳報告 artifact（保留 90 天）
         if: always()
         uses: actions/upload-artifact@v4
         with:
           name: playwright-run-${{ github.run_number }}-${{ env.ARCHIVE_STAMP }}
           path: reports/runs/
           retention-days: 90
           if-no-files-found: warn
