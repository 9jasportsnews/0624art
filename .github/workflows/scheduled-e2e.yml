name: 定時全項檢測

on:
  schedule:
    - cron: '45 1 * * *'
  workflow_dispatch:
    inputs:
      smoke_only:
        description: '只跑 1 項快速測試（驗證 TG，約 1 分鐘）'
        type: boolean
        default: false

concurrency:
  group: scheduled-e2e
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: 載入環境變數
        env:
          ENV_1: ${{ secrets.ENV_1 }}
        run: |
          printf "%s" "$ENV_1" > .env
          echo "CI=true" >> "$GITHUB_ENV"
          echo "GITHUB_ACTIONS=true" >> "$GITHUB_ENV"
          cat .env >> "$GITHUB_ENV"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: 安裝依賴
        run: npm ci

      - name: 安裝 Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: 執行 tests/recorded
        run: |
          if [ "${{ inputs.smoke_only }}" = "true" ]; then
            npx playwright test tests/recorded/desktop-download.spec.ts -g "電腦版-進入首頁" --project=desktop-chrome
          else
            npx playwright test tests/recorded
          fi

      - name: Telegram 通知
        if: always()
        run: |
          node scripts/verify-telegram-env.mjs || exit 0
          if [ -f reports/last-run.json ]; then
            npm run notify:telegram -- reports/last-run.json
          fi

      - name: 上傳報告 artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_number }}
          path: |
            playwright-report
            test-results
            reports
          retention-days: 90
